[vars]

worktree = "mise"

# mise-non-place utility tasks
# Run from .mise-non-place/ or mise/ directory

[tasks.list]
quiet = true
description = "List all projects in SEARCH_DIR with [x]/[ ] status"
run = """
  #!/usr/bin/env bash
  set -euo pipefail
  
  MNP_NAME="${MISE_PROJECT_ROOT##*/}"
  DIR_ARG="${1:-../..}"
  if [ ! -d "$DIR_ARG" ]; then
    echo "Error: Directory '$DIR_ARG' does not exist."
    exit 1
  fi
  SEARCH_DIR="$(realpath "$DIR_ARG")"

  echo "Projects with $MNP_NAME in $SEARCH_DIR:"
  echo ""

  for dir in "$SEARCH_DIR"/*/; do
    if [ -d "$dir/.git" ]; then
        [ -d "$dir/$MNP_NAME" ] && printf "[x] " || printf "[ ] "
        basename "$dir"
    fi
  done
"""

# Pick a project from a directory (stores selection in git config)
# Usage: mise run pick [<project_path>]
[tasks.pick]
quiet = true
description = "Pick a project from SEARCH_DIR or set directly (stores in git config)"
run = """
#!/usr/bin/env bash
set -euo pipefail

MNP_NAME="${MISE_PROJECT_ROOT##*-}"

# If first arg is a valid directory, use it directly
if [ -n "${1:-}" ] && [ -d "$1" ] && [ -d "$1/.git" ]; then
    SELECTED="$(realpath "$1")"
    git config --local mise-non-place.picked "$SELECTED"
    printf 'git config --local mise-non-place.picked "%s"\n' "$(git config --local mise-non-place.picked)"
    exit 0
fi

# Otherwise prompt to pick from SEARCH_DIR
DIR_ARG="${1:-../..}"
SEARCH_DIR="$(realpath "$DIR_ARG")"

if [ ! -d "$SEARCH_DIR" ]; then
    echo "Error: Directory '$SEARCH_DIR' does not exist." >&2
    exit 1
fi

i=1
declare -A projects
for dir in "$SEARCH_DIR"/*/; do
    if [ -d "$dir/.git" ]; then
        proj_name="$(basename "$dir")"
        projects[$i]="$dir"
        echo "$i) $proj_name"
        i=$((i + 1))
    fi
done

if [ "$i" -eq 1 ]; then
    echo "No git projects found." >&2
    exit 1
fi

echo ""
read -p "Enter number (or any other input to cancel): " num

if ! [[ "$num" =~ ^[0-9]+$ ]] || [ "$num" -lt 1 ] || [ "$num" -ge "$i" ]; then
    echo "Cancelled" >&2
    exit 1
fi

SELECTED="$(realpath "${projects[$num]}")"
git config --local mise-non-place.picked "$SELECTED"
printf 'git config --local mise-non-place.picked "%s"\n' "$(git config --local mise-non-place.picked)"
"""

# Usage: mise run new:worktree [<worktree_name> [<template>]]
# Example: mise run new:worktree
[tasks.new]
run = "mise run new:worktree {{@args}}"

[tasks.status]
description = "Show picked project and configured worktrees"
run = """
#!/usr/bin/env bash
set -euo pipefail

MNP_NAME="$(basename "$MISE_PROJECT_ROOT")"

PICKED="$(git config --local --get mise-non-place.picked 2>/dev/null || true)"
if [ -n "$PICKED" ]; then
    echo "Picked: $PICKED"
    echo ""
    
    MNP_DIR="$PICKED/$MNP_NAME"
    if [ -d "$MNP_DIR" ]; then
        echo "Worktrees:"
        git -C "$MNP_DIR" worktree list --porcelain | while read -r line; do
            case "$line" in
                "worktree "*) wt="${line#worktree }" ;;
                "branch refs/heads/"*) br="${line#branch refs/heads/}"; echo "  $wt -> $br" ;;
            esac
        done
    else
        echo "No $MNP_NAME configured in $PICKED"
    fi
else
    echo "No project picked. Run 'mise run pick /path' first."
fi
"""

[tasks.remove]
quiet = true
raw = true
confirm = "Are you sure you want to remove this worktree and its configurations from the target project?"
description = "Safely remove worktree from project (undo 'new')"
run = """
#!/usr/bin/env bash
set -euo pipefail

MNP_NAME="${MISE_PROJECT_ROOT##*/}"
CURRENT_BRANCH="$(git rev-parse --abbrev-ref HEAD)"
DIR_ARG="${1:-../..}"
if [ ! -d "$DIR_ARG" ]; then
    echo "Error: Directory '$DIR_ARG' does not exist."
    exit 1
fi
SEARCH_DIR="$(realpath "$DIR_ARG")"

echo "Projects with $MNP_NAME in $SEARCH_DIR:"
echo ""

i=1
for dir in "$SEARCH_DIR"/*/; do
    if [ -d "$dir/.git" ] && [ -d "$dir/$MNP_NAME" ]; then
        echo "$i) $(basename "$dir")"
        i=$((i + 1))
    fi
done

echo ""
read -p "Enter number to remove worktree/branch (or any other input to cancel): " num

if ! [[ "$num" =~ ^[0-9]+$ ]] || [ "$num" -lt 1 ] || [ "$num" -ge "$i" ]; then
    echo "Cancelled"
    exit 0
fi

i=1
for dir in "$SEARCH_DIR"/*/; do
    if [ -d "$dir/.git" ] && [ -d "$dir/$MNP_NAME" ]; then
        if [ "$i" -eq "$num" ]; then
            target="$(basename "$dir")"
            break
        fi
        i=$((i + 1))
    fi
done

echo "Selected: $target"
TARGET_DIR="$SEARCH_DIR/$target"

IS_SELF=0
if [ "$TARGET_DIR" = "$(dirname "$MISE_PROJECT_ROOT")" ]; then
    IS_SELF=1
fi

# Dynamically find and remove all worktrees linked to the target project
WORKTREES=()
while read -r wt_path; do
    if [ "$wt_path" != "$TARGET_DIR/$MNP_NAME" ]; then
        WORKTREES+=("$(basename "$wt_path")")
    fi
done < <(git -C "$TARGET_DIR/$MNP_NAME" worktree list 2>/dev/null | awk '{print $1}')

for wt in "${WORKTREES[@]}"; do
    echo "Removing worktree link $wt from $TARGET_DIR..."
    git -C "$TARGET_DIR/$MNP_NAME" worktree remove "../${wt}" --force || true
done

if [ "$IS_SELF" -eq 1 ]; then
    echo "Notice: I cannot delete the $MNP_NAME clone while running from inside it."
    echo "The worktrees have been cleanly unlinked, but $MNP_NAME remains ignored in your git exclude."
    echo ""
    echo "To completely finish the removal, step out of this directory and run:"
    echo "  cd \"$TARGET_DIR\""
    echo "  rm -rf \"$MNP_NAME\""
    echo "  grep -v \"^$MNP_NAME/$\" .git/info/exclude > .git/info/exclude.tmp && mv .git/info/exclude.tmp .git/info/exclude"
else
    echo "Removing cloned repository $MNP_NAME from $TARGET_DIR..."
    rm -rf "$TARGET_DIR/$MNP_NAME"
fi

# Remove from .git/info/exclude
EXCLUDE_FILE="$TARGET_DIR/.git/info/exclude"
if [ -f "$EXCLUDE_FILE" ]; then
    echo "Cleaning $EXCLUDE_FILE..."
    cp "$EXCLUDE_FILE" "$EXCLUDE_FILE.tmp"
    if [ "$IS_SELF" -eq 0 ]; then
        grep -v "^$MNP_NAME/$" "$EXCLUDE_FILE.tmp" > "$EXCLUDE_FILE.tmp2" || true
        mv "$EXCLUDE_FILE.tmp2" "$EXCLUDE_FILE.tmp"
    fi
    for wt in "${WORKTREES[@]}"; do
        grep -v "^$wt/$" "$EXCLUDE_FILE.tmp" > "$EXCLUDE_FILE.tmp2" || true
        mv "$EXCLUDE_FILE.tmp2" "$EXCLUDE_FILE.tmp"
    done
    mv "$EXCLUDE_FILE.tmp" "$EXCLUDE_FILE"
fi

echo "Cleanup complete."
"""
