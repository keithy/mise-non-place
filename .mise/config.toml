[vars]

worktree = "mise mise-test"

# mise-non-place utility tasks
# Run from .mise-non-place/ or mise/ directory

[tasks.root]
quiet = true
description = "Show the root of mise-non-place in this context"
run = "echo \"$MISE_PROJECT_ROOT\""

[tasks.list]

quiet = true
description = "List all projects in SEARCH_DIR with [x]/[ ] status"

run = """
  #!/usr/bin/env bash
  set -euo pipefail
  
  MNP_NAME="${MISE_PROJECT_ROOT##*/}"
  DIR_ARG="${1:-../..}"
  if [ ! -d "$DIR_ARG" ]; then
    echo "Error: Directory '$DIR_ARG' does not exist."
    exit 1
  fi
  SEARCH_DIR="$(realpath "$DIR_ARG")"

  echo "Projects with $MNP_NAME in $SEARCH_DIR:"
  echo ""

  for dir in "$SEARCH_DIR"/*/; do
    if [ -d "$dir/.git" ]; then
        [ -d "$dir/$MNP_NAME" ] && printf "[x] " || printf "[ ] "
        basename "$dir"
    fi
  done
"""

[tasks.new]
quiet = true
raw = true
description = "Clone mise-non-place to a project (prompts for selection)"
run = """
#!/usr/bin/env bash
set -euo pipefail

MNP_NAME="${MISE_PROJECT_ROOT##*/}"
CURRENT_BRANCH="$(git rev-parse --abbrev-ref HEAD)"
DIR_ARG="${1:-../..}"
if [ ! -d "$DIR_ARG" ]; then
    echo "Error: Directory '$DIR_ARG' does not exist."
    exit 1
fi
SEARCH_DIR="$(realpath "$DIR_ARG")"

echo "Current branch: $CURRENT_BRANCH"
echo "Projects without $MNP_NAME in $SEARCH_DIR:"
echo ""

i=1
for dir in "$SEARCH_DIR"/*/; do
    if [ -d "$dir/.git" ] && [ ! -d "$dir/$MNP_NAME" ]; then
        echo "$i) $(basename "$dir")"
        i=$((i + 1))
    fi
done

echo ""
read -p "Enter number (or any other input to cancel): " num

if ! [[ "$num" =~ ^[0-9]+$ ]] || [ "$num" -lt 1 ] || [ "$num" -ge "$i" ]; then
    echo "Cancelled"
    exit 0
fi

i=1
for dir in "$SEARCH_DIR"/*/; do
    if [ -d "$dir/.git" ] && [ ! -d "$dir/$MNP_NAME" ]; then
        if [ "$i" -eq "$num" ]; then
            target="$(basename "$dir")"
            break
        fi
        i=$((i + 1))
    fi
done

echo "Selected: $target"
TARGET_DIR="$SEARCH_DIR/$target"
TARGET_MNP="$TARGET_DIR/$MNP_NAME"
BRANCH_NAME="${MISE_VAR_WORKTREE:-mise}/$target"

echo "Cloning $MNP_NAME into $TARGET_DIR..."
git clone "$MISE_PROJECT_ROOT" "$TARGET_MNP"

echo "Adding worktree link(s)..."
# Read MISE_VAR_WORKTREE array correctly, falling back to just 'mise'
WORKTREES=()
eval "WORKTREES=(${MISE_VAR_WORKTREE:-mise})"

for wt in "${WORKTREES[@]}"; do
    echo "Processing worktree: $wt"
    if git -C "$TARGET_MNP" show-ref --verify --quiet "refs/remotes/origin/$wt/$target"; then
        echo "Branch $wt/$target already exists in origin. Using it."
        git -C "$TARGET_MNP" worktree add "../$wt" "$wt/$target"
    else
        echo "Creating new branch $wt/$target..."
        git -C "$TARGET_MNP" worktree add -b "$wt/$target" "../$wt"
    fi
    echo "Trusting mise configuration for $wt..."
    (cd "$TARGET_DIR/$wt" && mise trust)
done

echo "Trusting main config..."
(cd "$TARGET_MNP" && mise trust)

echo "Hiding $MNP_NAME and worktrees in $TARGET_DIR/.git/info/exclude..."
mkdir -p "$TARGET_DIR/.git/info"
EXCLUDE_FILE="$TARGET_DIR/.git/info/exclude"
if [ -f "$EXCLUDE_FILE" ]; then
    grep -v "^$MNP_NAME/$" "$EXCLUDE_FILE" > "$EXCLUDE_FILE.tmp" || true
    for wt in "${WORKTREES[@]}"; do
        grep -v "^$wt/$" "$EXCLUDE_FILE.tmp" > "$EXCLUDE_FILE.tmp2" || true
        mv "$EXCLUDE_FILE.tmp2" "$EXCLUDE_FILE.tmp"
    done
    mv "$EXCLUDE_FILE.tmp" "$EXCLUDE_FILE"
fi

echo "$MNP_NAME/" >> "$EXCLUDE_FILE"
for wt in "${WORKTREES[@]}"; do
    echo "$wt/" >> "$EXCLUDE_FILE"
done

echo "Done! The project is ready."
echo "You can now cd into $TARGET_DIR and run mise tasks."
"""




[tasks.remove]
quiet = true
raw = true
confirm = "Are you sure you want to remove this worktree and its configurations from the target project?"
description = "Safely remove worktree from project (undo 'new')"
run = """
#!/usr/bin/env bash
set -euo pipefail

MNP_NAME="${MISE_PROJECT_ROOT##*/}"
CURRENT_BRANCH="$(git rev-parse --abbrev-ref HEAD)"
DIR_ARG="${1:-../..}"
if [ ! -d "$DIR_ARG" ]; then
    echo "Error: Directory '$DIR_ARG' does not exist."
    exit 1
fi
SEARCH_DIR="$(realpath "$DIR_ARG")"

echo "Projects with $MNP_NAME in $SEARCH_DIR:"
echo ""

i=1
for dir in "$SEARCH_DIR"/*/; do
    if [ -d "$dir/.git" ] && [ -d "$dir/$MNP_NAME" ]; then
        echo "$i) $(basename "$dir")"
        i=$((i + 1))
    fi
done

echo ""
read -p "Enter number to remove worktree/branch (or any other input to cancel): " num

if ! [[ "$num" =~ ^[0-9]+$ ]] || [ "$num" -lt 1 ] || [ "$num" -ge "$i" ]; then
    echo "Cancelled"
    exit 0
fi

i=1
for dir in "$SEARCH_DIR"/*/; do
    if [ -d "$dir/.git" ] && [ -d "$dir/$MNP_NAME" ]; then
        if [ "$i" -eq "$num" ]; then
            target="$(basename "$dir")"
            break
        fi
        i=$((i + 1))
    fi
done

echo "Selected: $target"
TARGET_DIR="$SEARCH_DIR/$target"

IS_SELF=0
if [ "$TARGET_DIR" = "$(dirname "$MISE_PROJECT_ROOT")" ]; then
    IS_SELF=1
fi

# Dynamically find and remove all worktrees linked to the target project
WORKTREES=()
while read -r wt_path; do
    if [ "$wt_path" != "$TARGET_DIR/$MNP_NAME" ]; then
        WORKTREES+=("$(basename "$wt_path")")
    fi
done < <(git -C "$TARGET_DIR/$MNP_NAME" worktree list 2>/dev/null | awk '{print $1}')

for wt in "${WORKTREES[@]}"; do
    echo "Removing worktree link $wt from $TARGET_DIR..."
    git -C "$TARGET_DIR/$MNP_NAME" worktree remove "../${wt}" --force || true
done

if [ "$IS_SELF" -eq 1 ]; then
    echo "Notice: I cannot delete the $MNP_NAME clone while running from inside it."
    echo "The worktrees have been cleanly unlinked, but $MNP_NAME remains ignored in your git exclude."
    echo ""
    echo "To completely finish the removal, step out of this directory and run:"
    echo "  cd \"$TARGET_DIR\""
    echo "  rm -rf \"$MNP_NAME\""
    echo "  grep -v \"^$MNP_NAME/$\" .git/info/exclude > .git/info/exclude.tmp && mv .git/info/exclude.tmp .git/info/exclude"
else
    echo "Removing cloned repository $MNP_NAME from $TARGET_DIR..."
    rm -rf "$TARGET_DIR/$MNP_NAME"
fi

# Remove from .git/info/exclude
EXCLUDE_FILE="$TARGET_DIR/.git/info/exclude"
if [ -f "$EXCLUDE_FILE" ]; then
    echo "Cleaning $EXCLUDE_FILE..."
    cp "$EXCLUDE_FILE" "$EXCLUDE_FILE.tmp"
    if [ "$IS_SELF" -eq 0 ]; then
        grep -v "^$MNP_NAME/$" "$EXCLUDE_FILE.tmp" > "$EXCLUDE_FILE.tmp2" || true
        mv "$EXCLUDE_FILE.tmp2" "$EXCLUDE_FILE.tmp"
    fi
    for wt in "${WORKTREES[@]}"; do
        grep -v "^$wt/$" "$EXCLUDE_FILE.tmp" > "$EXCLUDE_FILE.tmp2" || true
        mv "$EXCLUDE_FILE.tmp2" "$EXCLUDE_FILE.tmp"
    done
    mv "$EXCLUDE_FILE.tmp" "$EXCLUDE_FILE"
fi

echo "Cleanup complete."
"""


