[vars]

worktree = "mise"

# mise-non-place utility tasks
# Run from .mise-non-place/ or mise/ directory

[tasks.list]
quiet = true
description = "List all projects in SEARCH_DIR with [x]/[ ] status"
run = """
  #!/usr/bin/env bash
  set -euo pipefail
  
  MNP_NAME="${MISE_PROJECT_ROOT##*/}"
  DIR_ARG="${1:-../..}"
  if [ ! -d "$DIR_ARG" ]; then
    echo "Error: Directory '$DIR_ARG' does not exist."
    exit 1
  fi
  SEARCH_DIR="$(realpath "$DIR_ARG")"

  echo "Projects with $MNP_NAME in $SEARCH_DIR:"
  echo ""

  for dir in "$SEARCH_DIR"/*/; do
    if [ -d "$dir/.git" ]; then
        [ -d "$dir/$MNP_NAME" ] && printf "[x] " || printf "[ ] "
        basename "$dir"
    fi
  done
"""

# Pick a project from a directory (stores selection in git config)
# Usage: mise run pick [<project_path>]
[tasks.pick]
quiet = true
description = "Pick a project from SEARCH_DIR or set directly (stores in git config)"
run = """
#!/usr/bin/env bash
set -euo pipefail

MNP_NAME="${MISE_PROJECT_ROOT##*-}"

# If first arg is a valid directory, use it directly
if [ -n "${1:-}" ] && [ -d "$1" ] && [ -d "$1/.git" ]; then
    SELECTED="$(realpath "$1")"
    git config --local mise-non-place.picked "$SELECTED"
    printf 'git config --local mise-non-place.picked "%s"\n' "$(git config --local mise-non-place.picked)"
    exit 0
fi

# Otherwise prompt to pick from SEARCH_DIR
DIR_ARG="${1:-../..}"
SEARCH_DIR="$(realpath "$DIR_ARG")"

if [ ! -d "$SEARCH_DIR" ]; then
    echo "Error: Directory '$SEARCH_DIR' does not exist." >&2
    exit 1
fi

i=1
declare -A projects
for dir in "$SEARCH_DIR"/*/; do
    if [ -d "$dir/.git" ]; then
        proj_name="$(basename "$dir")"
        projects[$i]="$dir"
        echo "$i) $proj_name"
        i=$((i + 1))
    fi
done

if [ "$i" -eq 1 ]; then
    echo "No git projects found." >&2
    exit 1
fi

echo ""
read -p "Enter number (or any other input to cancel): " num

if ! [[ "$num" =~ ^[0-9]+$ ]] || [ "$num" -lt 1 ] || [ "$num" -ge "$i" ]; then
    echo "Cancelled" >&2
    exit 1
fi

SELECTED="$(realpath "${projects[$num]}")"
git config --local mise-non-place.picked "$SELECTED"
printf 'git config --local mise-non-place.picked "%s"\n' "$(git config --local mise-non-place.picked)"
"""

# Usage: mise run worktree:add [<worktree_name> [<template>]]
# Example: mise run worktree:add
[tasks.new]
run = "mise run worktree:add {{@args}}"

[tasks.status]
description = "Show picked project and configured worktrees, or list all configured in a dir"
run = """
#!/usr/bin/env bash
set -euo pipefail

MNP_NAME="$(basename "$MISE_PROJECT_ROOT")"

# If arg provided, list all projects with mise-non-place in that dir
if [ -n "${1:-}" ]; then
    SEARCH_DIR="$(realpath "$1")"
    if [ ! -d "$SEARCH_DIR" ]; then
        echo "Error: Directory '$SEARCH_DIR' does not exist." >&2
        exit 1
    fi
    
    for dir in "$SEARCH_DIR"/*/; do
        if [ -d "$dir/$MNP_NAME" ]; then
            proj_name="$(basename "$dir")"
            echo "$proj_name:"
            git -C "$dir/$MNP_NAME" worktree list --porcelain | while read -r line; do
                case "$line" in
                    "worktree "*) wt="${line#worktree }"; echo "  $wt" ;;
                    "branch refs/heads/"*) br="${line#branch refs/heads/}"; echo "    -> $br" ;;
                esac
            done
            echo ""
        fi
    done
    exit 0
fi

# Otherwise show picked project
PICKED="$(git config --local --get mise-non-place.picked 2>/dev/null || true)"
if [ -n "$PICKED" ]; then
    echo "Picked: $PICKED"
    echo ""
    
    MNP_DIR="$PICKED/$MNP_NAME"
    if [ -d "$MNP_DIR" ]; then
        echo "Worktrees:"
        git -C "$MNP_DIR" worktree list --porcelain | while read -r line; do
            case "$line" in
                "worktree "*) wt="${line#worktree }" ;;
                "branch refs/heads/"*) br="${line#branch refs/heads/}"; echo "  $wt -> $br" ;;
            esac
        done
    else
        echo "No $MNP_NAME configured in $PICKED"
    fi
else
    echo "No project picked. Run 'mise run pick /path' first."
fi
"""

[tasks.remove-all]
description = "Remove all worktrees and .mise-non-place from picked project"
quiet = true
raw = true
confirm = "Are you sure you want to remove all worktrees and .mise-non-place?"
run = """
#!/usr/bin/env bash
set -euo pipefail

MNP_NAME="$(basename "$MISE_PROJECT_ROOT")"

# Get target from pick
TARGET_DIR="$(git config --local --get mise-non-place.picked 2>/dev/null || true)"
if [ -z "$TARGET_DIR" ]; then
    echo "Error: No project selected. Run 'mise run pick /path/to/project' first." >&2
    exit 1
fi

TARGET_DIR="$(realpath "$TARGET_DIR")"
TARGET_MNP="$TARGET_DIR/$MNP_NAME"

if [ ! -d "$TARGET_MNP" ]; then
    echo "Error: No .mise-non-place in $TARGET_DIR" >&2
    exit 1
fi

# Remove all worktrees
git -C "$TARGET_MNP" worktree list --porcelain | while read -r line; do
    case "$line" in
        "worktree "*) wt="${line#worktree }" ;;
        "")
            if [ -n "$wt" ] && [ "$wt" != "$TARGET_MNP" ]; then
                echo "Removing worktree $wt..."
                git -C "$TARGET_MNP" worktree remove "$wt" --force 2>/dev/null || true
            fi
            ;;
    esac
done

# Remove .mise-non-place
echo "Removing $TARGET_MNP..."
rm -rf "$TARGET_MNP"

# Clean exclude
if [ -f "$TARGET_DIR/.git/info/exclude" ]; then
    echo "Cleaning exclude file..."
    for f in "$MNP_NAME" mise scripts .config; do
        grep -v "^$f/$" "$TARGET_DIR/.git/info/exclude" > "$TARGET_DIR/.git/info/exclude.tmp" 2>/dev/null || true
        mv "$TARGET_DIR/.git/info/exclude.tmp" "$TARGET_DIR/.git/info/exclude" 2>/dev/null || true
    done
fi

echo "Done."
"""
